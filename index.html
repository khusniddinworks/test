                init() {
                    this.$watch('lang', val => localStorage.setItem('site_lang', val));
                    this.fetchPrices();
                    const urlParams = new URLSearchParams(window.location.search);
                    const from = urlParams.get('from') || urlParams.get('utm_source');
                    this.source = from || localStorage.getItem('lead_source') || 'togriga';
                    if (from) localStorage.setItem('lead_source', from);

                    const observer = new IntersectionObserver((entries) => {
                        entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('active'); });
                    }, { threshold: 0.1 });
                    document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
                },

                async fetchPrices() {
                    try {
                        const { data } = await supabaseClient.from('packages').select('*');
                        if (data) data.forEach(pkg => { this.packagesData[pkg.key_name] = pkg; });
                    } catch (e) { console.error(e); }
                },

                async submitBooking() {
                    if (document.getElementById('hp_field').value !== "") return;
                    const cleanName = this.bookingName.trim();
                    const cleanPhone = this.bookingPhone.trim().replace(/[^+0-9]/g, "");
                    if (!cleanName || !cleanPhone) { alert("Iltimos, ma'lumotlarni to'ldiring."); return; }
                    if(!this.isSubmitting) {
                        this.isSubmitting = true;
                        try {
                            const { error } = await supabaseClient.from('leads').insert([{ 
                                name: cleanName, phone: cleanPhone, package: this.selectedPackage, 
                                room: this.bookingRoom, source: this.source 
                            }]);
                            if (error) throw error;
                            this.showSuccess = true;
                            setTimeout(() => { this.activeModal = null; this.showSuccess = false; this.bookingName = ''; this.bookingPhone = ''; }, 3000);
                        } catch (err) { alert("Error! Please try again."); } finally { this.isSubmitting = false; }
                    }
                }
